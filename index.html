<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- TODO: Set the document title to the name of your application -->
    <title>CSP131 | Adriaan Dimate's Blog </title>
    <meta name="description" content="OJT Practicum Blog - Daily updates and reflections" />
    <meta name="author" content="CSP131 | Adriaan Dimate's Blog" />

    <meta property="og:title" content="CSP131 | Adriaan Dimate's Blog" />
    <meta property="og:description" content="OJT Practicum Blog - Daily updates and reflections" />
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary_large_image" />
  </head>

  <body>
    <div id="root">
      <!-- Initial loading screen shown before React loads -->
      <div id="initial-loader" style="
        position: fixed;
        inset: 0;
        background: hsl(210, 20%, 95%);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      ">
        <div style="display: flex; flex-direction: column; align-items: center; gap: 1.5rem;">
          <!-- Spinner -->
          <div style="position: relative; width: 4rem; height: 4rem;">
            <div style="
              position: absolute;
              inset: 0;
              border: 4px solid hsl(10, 75%, 50%, 0.3);
              border-top-color: hsl(10, 75%, 50%);
              border-radius: 50%;
              animation: spin 1s linear infinite;
            "></div>
          </div>
          
          <!-- Text -->
          <div style="text-align: center;">
            <h2 style="
              font-size: 1.5rem;
              font-weight: bold;
              color: hsl(215, 25%, 20%);
              margin-bottom: 0.5rem;
            ">Loading...</h2>
            <p style="
              color: hsl(215, 10%, 50%);
              font-size: 0.875rem;
            ">Please wait while we prepare your experience</p>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    
    <style>
      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      
      /* Dark mode support for initial loader */
      @media (prefers-color-scheme: dark) {
        #initial-loader {
          background: hsl(220, 20%, 10%) !important;
        }
        #initial-loader h2 {
          color: hsl(210, 20%, 90%) !important;
        }
        #initial-loader p {
          color: hsl(215, 10%, 55%) !important;
        }
      }
    </style>
  </body>
</html>
